name: generate-and-sync
on:
  push:
    paths:
      - 'base-uneiaparjour.ods'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install pandas odfpy
      - name: Generate CSV
        run: |
          python3 << 'EOF'
          import csv
          from odf.opendocument import load
          from odf.table import Table, TableRow, TableCell
          from odf.text import P

          FOCUS_VALUES = {'focus lettre', 'focus-lettre', 'focus'}

          def get_cell_text(cell):
              ps = cell.getElementsByType(P)
              if not ps:
                  return ''
              p = ps[0]
              text = ''
              for node in p.childNodes:
                  if hasattr(node, 'data'):
                      text += node.data
                  elif hasattr(node, 'childNodes'):
                      for child in node.childNodes:
                          if hasattr(child, 'data'):
                              text += child.data
              return text

          def expand_row(row):
              cells = row.getElementsByType(TableCell)
              result = []
              for cell in cells:
                  repeat = int(cell.getAttribute('numbercolumnsrepeated') or 1)
                  text = get_cell_text(cell)
                  result.extend([text] * repeat)
              return result

          doc = load('base-uneiaparjour.ods')
          sheets = doc.spreadsheet.getElementsByType(Table)
          base_sheet = next(s for s in sheets if s.getAttribute('name') == 'Base')
          rows = base_sheet.getElementsByType(TableRow)

          header = expand_row(rows[0])
          while header and not header[-1].strip():
              header.pop()

          cat_indices = [i for i, h in enumerate(header) if 'atégorie' in h]

          output_rows = []
          skipped_empty = 0
          skipped_focus = 0
          for row in rows[1:]:
              values = expand_row(row)
              if not any(v.strip() for v in values):
                  skipped_empty += 1
                  continue
              cats = [values[i].strip().lower() for i in cat_indices if i < len(values)]
              if any(c in FOCUS_VALUES for c in cats):
                  skipped_focus += 1
                  continue
              output_rows.append(values)

          print(f"1. Lignes lues : {len(rows) - 1}")
          print(f"2. Lignes vides ignorees : {skipped_empty}")
          print(f"3. Articles Focus exclus : {skipped_focus}")
          print(f"4. Final CSV : {len(output_rows)} lignes")
          print(f"5. Colonnes : {len(header)} ({header})")

          n = len(header)
          with open('base-uneiaparjour.csv', 'w', newline='', encoding='utf-8') as f:
              writer = csv.writer(f)
              writer.writerow(header[:n])
              for r in output_rows:
                  padded = r + [''] * (n - len(r))
                  writer.writerow(padded[:n])

          print(f"CSV ecrit : {len(output_rows)} lignes")
          titre_idx = next((i for i, h in enumerate(header) if h.lower() == 'titre'), 0)
          date_idx = next((i for i, h in enumerate(header) if 'date' in h.lower()), n-1)
          print("Premieres lignes :")
          for r in output_rows[:3]:
              print(f"  {r[titre_idx]} — {r[date_idx]}")
          print("Dernieres lignes :")
          for r in output_rows[-3:]:
              print(f"  {r[titre_idx]} — {r[date_idx]}")
          EOF
      - name: Commit CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add base-uneiaparjour.csv
          git diff --cached --quiet || git commit -m "Mise a jour CSV ($(date +%Y-%m-%d))"
          git push
      - name: Sync Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git lfs install
          git clone https://huggingface.co/datasets/uneIAparjour/base hf-dataset
          cd hf-dataset
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://uneIAparjour:${HF_TOKEN}@huggingface.co/datasets/uneIAparjour/base
          cp ../base-uneiaparjour.csv .
          cp ../base-uneiaparjour.ods .
          cp ../huggingface-README.md README.md
          git add -A
          git diff --cached --quiet || git commit -m "Mise a jour base ($(date +%Y-%m-%d))"
          git push
