name: update-readmes
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Update READMEs
        run: |
          python3 << 'EOF'
          import re
          import pandas as pd
          from datetime import datetime, timezone

          nb = len(pd.read_csv('base-uneiaparjour.csv'))
          date = datetime.now(timezone.utc).strftime('%d/%m/%Y')

          for fname, patterns in {
              'README.md': [
                  (r'\*\*\d[\d ]* outils\*\* recensés \(au [^\)]+\)', f'**{nb} outils** recensés (au {date})'),
                  (r'Plage : [\d/]+ → [\d/]+', f'Plage : 16/02/2023 → {date}'),
              ],
              'huggingface-README.md': [
                  (r'\*\*\d[\d ]* outils\*\* \(au [^\)]+\)', f'**{nb} outils** (au {date})'),
                  (r'\*\*Période\*\* : .+', f'**Période** : 16 février 2023 → {date}'),
                  (r'Base de données du site uneIAparjour\.fr au [\d/]+, Bertrand', f'Base de données du site uneIAparjour.fr au {date}, Bertrand'),
              ],
          }.items():
              content = open(fname, encoding='utf-8').read()
              for pattern, replacement in patterns:
                  content = re.sub(pattern, replacement, content)
              open(fname, 'w', encoding='utf-8').write(content)
              print(f'{fname} mis a jour : {nb} outils au {date}')
          EOF
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md huggingface-README.md
          git diff --cached --quiet || git commit -m "update READMEs : $(python3 -c "print(sum(1 for _ in open('base-uneiaparjour.csv'))-1)") outils"
          git push
      - name: Sync huggingface-README to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git lfs install
          git clone https://huggingface.co/datasets/uneIAparjour/base hf-dataset
          cd hf-dataset
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://uneIAparjour:${HF_TOKEN}@huggingface.co/datasets/uneIAparjour/base
          cp ../huggingface-README.md README.md
          git add README.md
          git diff --cached --quiet || git commit -m "update README $(date +%Y-%m-%d)"
          git push
