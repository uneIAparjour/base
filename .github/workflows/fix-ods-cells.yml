name: fix-ods-cells
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install pandas odfpy
      - name: Fix mal-formatted cells
        run: |
          python3 << 'EOF'
          import pandas as pd
          from odf.opendocument import load
          from odf.table import Table, TableRow, TableCell
          from odf.text import P

          ODS_PATH = 'base-uneiaparjour.ods'

          def get_cell_text_odf(cell):
              """Lit le texte d'une cellule via odfpy (fonctionne même sur les cellules mal formatées)."""
              ps = cell.getElementsByType(P)
              if not ps:
                  return ''
              p = ps[0]
              text = ''
              for node in p.childNodes:
                  if hasattr(node, 'data'):
                      text += node.data
                  elif hasattr(node, 'childNodes'):
                      for child in node.childNodes:
                          if hasattr(child, 'data'):
                              text += child.data
              return text

          def get_cell_at_index(row, target_index):
              cells = row.getElementsByType(TableCell)
              current = 0
              for cell in cells:
                  repeat = int(cell.getAttribute('numbercolumnsrepeated') or 1)
                  if current + repeat > target_index:
                      return cell
                  current += repeat
              return None

          def make_cell(val):
              """Crée une cellule avec un nœud texte explicite, lisible par pandas."""
              cell = TableCell()
              p = P()
              p.addText(str(val) if val is not None else '')
              cell.addElement(p)
              return cell

          # 1. Identifier les lignes problématiques via pandas
          df = pd.read_excel(ODS_PATH, engine='odf', sheet_name='Base')
          bad_indices = df[df.isnull().all(axis=1)].index.tolist()
          print(f"Lignes problématiques (index pandas) : {bad_indices}")

          if not bad_indices:
              print("Aucune ligne à corriger.")
              exit(0)

          # 2. Charger l'ODS avec odfpy
          doc = load(ODS_PATH)
          sheets = doc.spreadsheet.getElementsByType(Table)
          base_sheet = next(s for s in sheets if s.getAttribute('name') == 'Base')
          all_rows = base_sheet.getElementsByType(TableRow)

          # Les lignes pandas (0-based après header) = all_rows[index+1]
          nb_cols = 10  # Titre, Description, URL, Cat1-6, Date

          fixed = 0
          for pandas_idx in bad_indices:
              ods_row_idx = pandas_idx + 1  # +1 pour sauter l'en-tête
              row = all_rows[ods_row_idx]

              # Lire les valeurs actuelles via odfpy
              values = []
              for col_idx in range(nb_cols):
                  cell = get_cell_at_index(row, col_idx)
                  val = get_cell_text_odf(cell).strip() if cell else ''
                  values.append(val)

              print(f"Ligne {ods_row_idx} — Titre: '{values[0]}', Date: '{values[9]}'")

              # Réécrire la ligne avec des cellules propres
              new_row = TableRow()
              for val in values:
                  new_row.addElement(make_cell(val))

              # Remplacer l'ancienne ligne
              base_sheet.insertBefore(new_row, row)
              base_sheet.removeChild(row)
              fixed += 1

          print(f"\n{fixed} ligne(s) corrigée(s)")
          doc.save(ODS_PATH)
          print("ODS sauvegardé.")

          # 3. Vérification
          df2 = pd.read_excel(ODS_PATH, engine='odf', sheet_name='Base')
          df2 = df2.dropna(how='all')
          print(f"Vérification pandas après correction : {len(df2)} lignes")
          print(df2.head(3)[['Titre', 'Date de publication']].to_string())
          EOF

      - name: Generate CSV
        run: |
          python3 << 'EOF'
          import pandas as pd
          df = pd.read_excel('base-uneiaparjour.ods', engine='odf', sheet_name='Base')
          df = df.dropna(how='all')
          df['Date de publication'] = pd.to_datetime(
              df['Date de publication'], format='%d/%m/%Y', errors='coerce'
          ).dt.strftime('%d/%m/%Y')
          cat_cols = [c for c in df.columns if 'atégorie' in c]
          mask_focus = df[cat_cols].apply(
              lambda col: col.str.lower().str.strip().isin(['focus lettre', 'focus-lettre', 'focus'])
          ).any(axis=1)
          df = df[~mask_focus]
          df.to_csv('base-uneiaparjour.csv', index=False, encoding='utf-8')
          print(f"CSV généré : {len(df)} lignes")
          EOF

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add base-uneiaparjour.ods base-uneiaparjour.csv
          git diff --cached --quiet || git commit -m "fix: correction cellules ODS + regeneration CSV"
          git push

      - name: Sync Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git lfs install
          git clone https://huggingface.co/datasets/uneIAparjour/base hf-dataset
          cd hf-dataset
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://uneIAparjour:${HF_TOKEN}@huggingface.co/datasets/uneIAparjour/base
          cp ../base-uneiaparjour.csv .
          cp ../base-uneiaparjour.ods .
          cp ../huggingface-README.md README.md
          git add -A
          git diff --cached --quiet || git commit -m "fix: correction base $(date +%Y-%m-%d)"
          git push
