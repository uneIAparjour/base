name: nightly-ods-update
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install feedparser odfpy pandas
      - name: Update ODS
        id: update_ods
        run: |
          python update_ods.py
          if git status --porcelain base-uneiaparjour.ods | grep -q .; then
            echo "modified=true" >> $GITHUB_OUTPUT
          else
            echo "modified=false" >> $GITHUB_OUTPUT
          fi
      - name: Generate CSV
        if: steps.update_ods.outputs.modified == 'true'
        run: |
          python3 << 'EOF'
          import csv
          from odf.opendocument import load
          from odf.table import Table, TableRow, TableCell
          from odf.text import P

          FOCUS_VALUES = {'focus lettre', 'focus-lettre', 'focus'}

          def get_cell_text(cell):
              ps = cell.getElementsByType(P)
              if not ps:
                  return ''
              p = ps[0]
              text = ''
              for node in p.childNodes:
                  if hasattr(node, 'data'):
                      text += node.data
                  elif hasattr(node, 'childNodes'):
                      for child in node.childNodes:
                          if hasattr(child, 'data'):
                              text += child.data
              return text

          def expand_row(row):
              cells = row.getElementsByType(TableCell)
              result = []
              for cell in cells:
                  repeat = int(cell.getAttribute('numbercolumnsrepeated') or 1)
                  text = get_cell_text(cell)
                  result.extend([text] * repeat)
              return result

          doc = load('base-uneiaparjour.ods')
          sheets = doc.spreadsheet.getElementsByType(Table)
          base_sheet = next(s for s in sheets if s.getAttribute('name') == 'Base')
          rows = base_sheet.getElementsByType(TableRow)

          header = expand_row(rows[0])
          cat_indices = [i for i, h in enumerate(header) if 'atégorie' in h]

          output_rows = []
          for row in rows[1:]:
              values = expand_row(row)
              # Ignorer les lignes entièrement vides
              if not any(v.strip() for v in values):
                  continue
              # Ignorer les lignes Focus
              cats = [values[i].strip().lower() for i in cat_indices if i < len(values)]
              if any(c in FOCUS_VALUES for c in cats):
                  continue
              output_rows.append(values)

          # Tronquer toutes les lignes à la longueur du header
          n = len(header)
          with open('base-uneiaparjour.csv', 'w', newline='', encoding='utf-8') as f:
              writer = csv.writer(f)
              writer.writerow(header[:n])
              for r in output_rows:
                  writer.writerow(r[:n])

          print(f"CSV : {len(output_rows)} lignes")
          EOF
      - name: Update READMEs
        if: steps.update_ods.outputs.modified == 'true'
        run: |
          python3 << 'EOF'
          import re
          import pandas as pd
          from datetime import datetime, timezone
          nb = len(pd.read_csv('base-uneiaparjour.csv'))
          date = datetime.now(timezone.utc).strftime('%d/%m/%Y')
          for fname, patterns in {
              'README.md': [
                  (r'\*\*\d[\d ]* outils\*\* recensés \(au [^\)]+\)', f'**{nb} outils** recensés (au {date})'),
                  (r'Plage : [\d/]+ → [\d/]+', f'Plage : 16/02/2023 → {date}'),
              ],
              'huggingface-README.md': [
                  (r'\*\*\d[\d ]* outils\*\* \(au [^\)]+\)', f'**{nb} outils** (au {date})'),
                  (r'\*\*Période\*\* : .+', f'**Période** : 16 février 2023 → {date}'),
                  (r'Base de données du site uneIAparjour\.fr au [\d/]+, Bertrand', f'Base de données du site uneIAparjour.fr au {date}, Bertrand'),
              ],
              'agent.md': [
                  (r'\*\*\d[\d ]* outils\*\* référencés \(au [^\)]+\)', f'**{nb} outils** référencés (au {date})'),
              ],
          }.items():
              content = open(fname, encoding='utf-8').read()
              for pattern, replacement in patterns:
                  content = re.sub(pattern, replacement, content)
              open(fname, 'w', encoding='utf-8').write(content)
              print(f'{fname} mis a jour : {nb} outils au {date}')
          EOF
      - name: Commit
        if: steps.update_ods.outputs.modified == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add base-uneiaparjour.ods base-uneiaparjour.csv README.md huggingface-README.md agent.md
          git diff --cached --quiet || git commit -m "nightly update $(date -u +'%d/%m/%Y')"
          git push
      - name: Sync Hugging Face
        if: steps.update_ods.outputs.modified == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git lfs install
          git clone https://huggingface.co/datasets/uneIAparjour/base hf-dataset
          cd hf-dataset
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://uneIAparjour:${HF_TOKEN}@huggingface.co/datasets/uneIAparjour/base
          cp ../base-uneiaparjour.csv .
          cp ../base-uneiaparjour.ods .
          cp ../huggingface-README.md README.md
          git add -A
          git diff --cached --quiet || git commit -m "nightly update $(date -u +'%d/%m/%Y')"
          git push
