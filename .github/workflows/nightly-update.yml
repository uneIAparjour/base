name: nightly-ods-update

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install feedparser odfpy pandas

      - name: Update ODS
        id: update_ods
        run: |
          python update_ods.py
          if git status --porcelain base-uneiaparjour.ods | grep -q .; then
            echo "modified=true" >> $GITHUB_OUTPUT
          else
            echo "modified=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate CSV
        if: steps.update_ods.outputs.modified == 'true'
        run: |
          python3 << 'EOF'
          import pandas as pd
          df = pd.read_excel('base-uneiaparjour.ods', engine='odf', sheet_name='Base')
          df = df.dropna(how='all')
          df['Date de publication'] = pd.to_datetime(df['Date de publication'], format='%d/%m/%Y').dt.strftime('%d/%m/%Y')
          cat_cols = [c for c in df.columns if 'atégorie' in c]
          mask_focus = df[cat_cols].apply(lambda col: col.str.lower().str.strip().isin(['focus lettre', 'focus-lettre', 'focus'])).any(axis=1)
          df = df[~mask_focus]
          df.to_csv('base-uneiaparjour.csv', index=False, encoding='utf-8')
          print(f"CSV : {len(df)} lignes")
          EOF

      - name: Update READMEs
        if: always()
        run: |
          NB=$(( $(wc -l < base-uneiaparjour.csv) - 1 ))
          DATE=$(date -u +'%d/%m/%Y')

          sed -i "s/\*\*[0-9 ]* outils\*\* recensés (au .*)/\*\*${NB} outils\*\* recensés (au ${DATE})/" README.md
          sed -i "s/Plage : .*→.*/Plage : 16\/02\/2023 → ${DATE}/" README.md

          sed -i "s/\*\*[0-9 ]* outils\*\* (au .*)/\*\*${NB} outils\*\* (au ${DATE})/" huggingface-README.md
          sed -i "s/\*\*Période\*\* : .*/\*\*Période\*\* : 16 février 2023 → ${DATE}/" huggingface-README.md
          sed -i "s/Base de données du site uneIAparjour.fr au .*, Bertrand/Base de données du site uneIAparjour.fr au ${DATE}, Bertrand/" huggingface-README.md

          echo "READMEs mis a jour : ${NB} outils au ${DATE}"

      - name: Commit
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add base-uneiaparjour.ods base-uneiaparjour.csv README.md huggingface-README.md
          git diff --cached --quiet || git commit -m "nightly update $(date -u +'%d/%m/%Y')"
          git push

      - name: Sync Hugging Face
        if: steps.update_ods.outputs.modified == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git lfs install
          git clone https://huggingface.co/datasets/uneIAparjour/base hf-dataset
          cd hf-dataset
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://uneIAparjour:${HF_TOKEN}@huggingface.co/datasets/uneIAparjour/base
          cp ../base-uneiaparjour.csv .
          cp ../base-uneiaparjour.ods .
          cp ../huggingface-README.md README.md
          git add -A
          git diff --cached --quiet || git commit -m "nightly update $(date -u +'%d/%m/%Y')"
          git push
